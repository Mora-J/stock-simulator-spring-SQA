name: Java + Postman CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-unit-tests:
        description: "Ejecutar pruebas unitarias"
        required: false
        default: "true"
      run-integration-tests:
        description: "Ejecutar pruebas de integración"
        required: false
        default: "true"

jobs:
  backend-metrics:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs['run-unit-tests'] == 'true' || github.event.inputs['run-integration-tests'] == 'true' }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: elpepe123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: elpepe123
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/.cache
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Set workflow start timestamp
        run: echo "WORKFLOW_START_TS=$(date +%s)" >> $GITHUB_ENV

      - name: Run Java unit tests
        run: ./mvnw test -Dmaven.test.failure.ignore=true -B

      - name: Start Spring Boot backend
        run: |
          ./mvnw spring-boot:run &
          echo $! > app.pid
          for i in {1..30}; do
            if curl -sS http://localhost:8080/api/stock/all > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          cat app.pid
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman integration tests
        run: |
          mkdir -p reports
          newman run "Stock Simulator - Integración.postman_collection.json" \
            -r cli,json \
            --reporter-json-export reports/newman-report.json \
            --suppress-exit-code

      - name: Generate backend governance metrics
        run: node scripts/parse-backend-metrics.js

      - name: Stop Spring Boot backend
        if: always()
        run: |
          kill $(cat app.pid) || true

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-governance-artifacts
          path: |
            backend-metrics-governance.csv
            backend-metrics-governance.json
            reports/newman-report.json
            target/surefire-reports
            target/site/jacoco
  publish-pages:
      needs: backend-metrics
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Download governance artifacts
          uses: actions/download-artifact@v4
          with:
            name: backend-governance-artifacts
            path: artifacts

        - name: Build GitHub Pages site
          run: |
            mkdir -p gh-pages/reports
            cp artifacts/backend-metrics-governance.json gh-pages/
            cp artifacts/backend-metrics-governance.csv gh-pages/
            cp artifacts/reports/newman-report.json gh-pages/reports/
            mkdir -p gh-pages/jacoco
            cp -r artifacts/target/site/jacoco/* gh-pages/jacoco/

            cat > gh-pages/index.html <<'EOF'
            <!doctype html>
            <html lang="es">
            <head>
              <meta charset="utf-8">
              <title>QAOps Dashboard - Backend</title>
              <style>
                body { font-family: Arial, sans-serif; margin: 2rem; background:#f7fafc; color:#111827; }
                .card { background:#fff; border:1px solid #d1d5db; border-radius:12px; padding:1.2rem; margin-bottom:1rem; box-shadow:0 1px 2px rgba(15,23,42,0.05); }
                .title { font-size:1.8rem; margin-bottom:0.5rem; }
                .metric { font-size:2.5rem; font-weight:700; color:#1d4ed8; }
                .label { font-size:0.95rem; color:#475569; }
                a { color:#2563eb; text-decoration:none; }
              </style>
            </head>
            <body>
              <h1>QAOps Dashboard - Backend</h1>
              <div id="metrics"></div>
              <h2>Reportes</h2>
              <ul>
                <li><a href="backend-metrics-governance.csv" target="_blank">CSV de gobernanza</a></li>
                <li><a href="reports/newman-report.json" target="_blank">Reporte JSON de Newman</a></li>
                <li><a href="jacoco/index.html" target="_blank">Reporte JaCoCo</a></li>
              </ul>
              <script>
                fetch('backend-metrics-governance.json')
                  .then(res => res.json())
                  .then(data => {
                    document.getElementById('metrics').innerHTML = `
                      <div class="card">
                        <div class="label">Cobertura de Código</div>
                        <div class="metric">${data.coverage_percent}%</div>
                      </div>
                      <div class="card">
                        <div class="label">Tasa de éxito unitario</div>
                        <div class="metric">${data.unit_test_success_rate_percent}%</div>
                      </div>
                      <div class="card">
                        <div class="label">Densidad de defectos unitarias</div>
                        <div class="metric">${data.defect_density_unitarias}</div>
                      </div>
                      <div class="card">
                        <div class="label">Tasa de éxito API</div>
                        <div class="metric">${data.api_pass_rate_percent}%</div>
                      </div>
                      <div class="card">
                        <div class="label">Densidad de defectos API</div>
                        <div class="metric">${data.api_defect_density}</div>
                      </div>
                      <div class="card">
                        <div class="label">Lead time del pipeline</div>
                        <div class="metric">${data.pipeline_lead_time_seconds} s</div>
                      </div>
                    `;
                  })
                  .catch(err => {
                    document.getElementById('metrics').textContent = 'Error cargando métricas.';
                    console.error(err);
                  });
              </script>
            </body>
            </html>
            EOF

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@v3
          with:
            path: gh-pages

        - name: Deploy to GitHub Pages
          uses: actions/deploy-pages@v4
name: Java + Postman CI

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-unit-tests:
        description: "Ejecutar pruebas unitarias"
        required: false
        default: "true"
      run-integration-tests:
        description: "Ejecutar pruebas de integración"
        required: false
        default: "true"

jobs:
  backend-metrics:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs['run-unit-tests'] == 'true' || github.event.inputs['run-integration-tests'] == 'true' }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: elpepe123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: elpepe123
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/.cache
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Ensure mvnw is executable
        run: chmod +x mvnw

      - name: Set workflow start timestamp
        run: echo "WORKFLOW_START_TS=$(date +%s)" >> $GITHUB_ENV

      - name: Run Java unit tests
        run: ./mvnw test -Dmaven.test.failure.ignore=true -B

      - name: Start Spring Boot backend
        run: |
          ./mvnw spring-boot:run &
          echo $! > app.pid
          for i in {1..30}; do
            if curl -sS http://localhost:8080/api/stock/all > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          cat app.pid
          exit 1

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman integration tests
        run: |
          mkdir -p reports
          newman run "Stock Simulator - Integración.postman_collection.json" \
            -r cli,json \
            --reporter-json-export reports/newman-report.json \
            --suppress-exit-code

      - name: Generate backend governance metrics
        run: node scripts/parse-backend-metrics.js

      - name: Stop Spring Boot backend
        if: always()
        run: |
          kill $(cat app.pid) || true

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-governance-artifacts
          path: |
            backend-metrics-governance.csv
            backend-metrics-governance.json
            reports/newman-report.json
            target/surefire-reports
            target/site/jacoco